name: Build and Push Python App

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [truenas_runners]

    steps:
      - uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build image
        run: docker build -t ${{ secrets.DOCKER_USER }}/python-app ./app

      - name: test image
        run: docker run ${{ secrets.DOCKER_USER }}/python-app

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USER }}/python-app
